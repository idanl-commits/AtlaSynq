    <style>
      :root {
        --primary: #2563eb;
        --text: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #f8fafc;
        color: var(--text);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: white;
        width: 100%;
        max-width: 400px;
        padding: 40px;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05),
          0 8px 10px -6px rgba(0, 0, 0, 0.01);
        text-align: center;
      }
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 1.5rem;
        color: var(--text);
        text-decoration: none;
        font-family: "Plus Jakarta Sans", sans-serif;
        gap: 8px;
        margin-bottom: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        font-family: "Plus Jakarta Sans";
      }
      p {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }

      .input-group {
        text-align: left;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.95rem;
        transition: 0.2s;
      }
      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .btn-login {
        width: 100%;
        background: var(--text);
        color: white;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        margin-top: 1rem;
        transition: 0.2s;
      }
      .btn-login:hover {
        background: #334155;
      }

      .back-link {
        display: block;
        margin-top: 20px;
        font-size: 0.85rem;
        color: var(--text-muted);
        text-decoration: none;
      }
      .back-link:hover {
        color: var(--primary);
      }

      #loginMsg {
        padding: 0.65rem 0.85rem;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        display: none;
        text-align: left;
      }
      #loginMsg.error {
        background: #fef2f2;
        color: #dc2626;
        border: 1px solid #fecaca;
        display: block;
      }
      #loginMsg.info {
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
        display: block;
      }
      .oauth-btns {
        display: flex;
        gap: 0.75rem;
        margin-top: 1rem;
      }
      .btn-oauth {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: 0.2s;
      }
      .btn-oauth svg {
        flex-shrink: 0;
      }
      .btn-oauth:hover {
        border-color: var(--primary);
        background: #f8fafc;
      }
      #loggedIn { display: none; }
      #loggedIn.show { display: block; }

      /* Mobile Responsive */
      @media(max-width: 480px) {
        body {
          padding: 1rem;
        }
        .login-card {
          padding: 30px 24px;
          max-width: 100%;
        }
        h1 {
          font-size: 1.3rem;
        }
        .logo {
          font-size: 1.3rem;
        }
        input {
          font-size: 16px; /* Prevents zoom on iOS */
        }
      }

      /* Quote Modal - Smart Lead Flow */
      #quoteModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        font-family: 'Inter', sans-serif;
      }

      #quoteModal.active {
        display: flex;
      }

      .quote-modal-container {
        background: white;
        border-radius: 16px;
        padding: 2.5rem;
        max-width: 500px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        position: relative;
        animation: modalFadeIn 0.3s ease-out;
      }

      @keyframes modalFadeIn {
        from {
          opacity: 0;
          transform: scale(0.95) translateY(-20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .quote-modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        font-size: 1.5rem;
        color: #64748b;
        cursor: pointer;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: all 0.2s;
      }

      .quote-modal-close:hover {
        background: #f1f5f9;
        color: #0f172a;
      }

      .quote-modal-title {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #0f172a;
      }

      .quote-modal-subtitle {
        color: #64748b;
        margin-bottom: 1.5rem;
        font-size: 0.95rem;
      }

      .quote-form-group {
        margin-bottom: 1.25rem;
      }

      .quote-form-group label {
        display: block;
        font-weight: 600;
        font-size: 0.9rem;
        color: #0f172a;
        margin-bottom: 0.5rem;
      }

      .quote-form-group input,
      .quote-form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        transition: all 0.2s;
        box-sizing: border-box;
      }

      .quote-form-group input:focus,
      .quote-form-group textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .quote-form-group textarea {
        resize: vertical;
        min-height: 100px;
      }

      .quote-submit-btn {
        width: 100%;
        padding: 14px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.5rem;
      }

      .quote-submit-btn:hover:not(:disabled) {
        background: #1d4ed8;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      }

      .quote-submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .quote-success-message {
        display: none;
        text-align: center;
        padding: 2rem 0;
      }

      .quote-success-message.active {
        display: block;
      }

      .quote-success-icon {
        width: 64px;
        height: 64px;
        background: rgba(37, 99, 235, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        color: #2563eb;
      }

      .quote-success-message h3 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #0f172a;
      }

      .quote-success-message p {
        color: #64748b;
        font-size: 1rem;
      }

      .quote-form-fields {
        transition: opacity 0.3s;
      }

      .quote-form-fields.hidden {
        display: none;
      }

      @media(max-width: 768px) {
        .quote-modal-container {
          padding: 1.5rem;
          width: 95%;
        }
      }
    </style>
  </head>

    <script>
      // Quote Modal Functions
      function openQuoteModal() {
        const modal = document.getElementById('quoteModal');
        const formStep = document.getElementById('formStep');
        const successStep = document.getElementById('successStep');
        const submitBtn = document.getElementById('leadSubmitBtn');
        
        if (!modal || !formStep || !successStep || !submitBtn) return;
        
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // Reset UI state
        formStep.style.display = 'block';
        successStep.style.display = 'none';
        submitBtn.textContent = 'Request Quote';
        
        if (typeof gtag !== 'undefined') {
          gtag('event', 'generate_lead', {'send_to': 'G-JXPHR1VRHF'});
        }
      }

      function closeQuoteModal() {
        const modal = document.getElementById('quoteModal');
        if (!modal) return;
        
        modal.classList.remove('active');
        document.body.style.overflow = '';
        
        // Reset form after a delay
        setTimeout(() => {
          const form = document.getElementById('quoteForm');
          const formStep = document.getElementById('formStep');
          const successStep = document.getElementById('successStep');
          const submitBtn = document.getElementById('leadSubmitBtn');
          
          if (form) form.reset();
          if (formStep) formStep.style.display = 'block';
          if (successStep) successStep.style.display = 'none';
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Request Quote';
          }
        }, 300);
      }

      // Split Behavior Script - Runs on DOMContentLoaded
      document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('quoteForm');
        const formStep = document.getElementById('formStep');
        const successStep = document.getElementById('successStep');
        const submitBtn = document.getElementById('leadSubmitBtn');
        
        // Handle form submission (Quote Modal only)
        if (form) {
          form.addEventListener('submit', function(e) {
            // Do NOT prevent default - let it post to iframe
            if (submitBtn) {
              submitBtn.disabled = true;
              submitBtn.textContent = 'Sending...';
            }
            
            // Immediately hide form and show success
            if (formStep) formStep.style.display = 'none';
            if (successStep) successStep.style.display = 'block';
            
            // Wait 3s, then close modal
            setTimeout(function() {
              closeQuoteModal();
            }, 3000);
          });
        }

        // Split Detection: Find ALL buttons and links by TEXT content
        const allButtons = document.querySelectorAll('button, a');
        allButtons.forEach(function(btn) {
          const btnText = btn.textContent.trim().toLowerCase();
          
          // Clean up: Remove old event listeners and onclick handlers
          if (btn.getAttribute('onclick')) {
            btn.removeAttribute('onclick');
          }
          
          // CASE A: "Book Demo" - Open Calendly Popup Widget directly
          if (btnText.includes('book demo')) {
            btn.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              
              // Open Calendly popup widget
              if (window.Calendly && typeof window.Calendly.initPopupWidget === 'function') {
                window.Calendly.initPopupWidget({ url: 'https://calendly.com/idanl-atlasynq/30min' });
              } else {
                // Fallback: Wait for Calendly to load
                let attempts = 0;
                const checkCalendly = setInterval(function() {
                  attempts++;
                  if (window.Calendly && typeof window.Calendly.initPopupWidget === 'function') {
                    clearInterval(checkCalendly);
                    window.Calendly.initPopupWidget({ url: 'https://calendly.com/idanl-atlasynq/30min' });
                  } else if (attempts > 20) {
                    clearInterval(checkCalendly);
                    // Final fallback: redirect to Calendly
                    window.location.href = 'https://calendly.com/idanl-atlasynq/30min';
                  }
                }, 100);
              }
              
              return false;
            }, true);
          }
          
          // CASE B: "Request Quote" or "Contact Sales" - Open Quote Modal
          if (btnText.includes('request quote') || btnText.includes('contact sales')) {
            btn.addEventListener('click', function(e) {
              // Only handle if it's a button or a link without a real href
              if (btn.tagName === 'BUTTON' || (btn.tagName === 'A' && (!btn.href || btn.href === '#' || btn.href.includes('javascript:')))) {
                e.preventDefault();
                e.stopPropagation();
                openQuoteModal();
                return false;
              }
            }, true);
          }
        });
      });

      document.addEventListener('click', function(e) {
        const modal = document.getElementById('quoteModal');
        if (e.target === modal) {
          closeQuoteModal();
        }
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          const modal = document.getElementById('quoteModal');
          if (modal && modal.classList.contains('active')) {
            closeQuoteModal();
          }
        }
      });

      // Login form — control-plane API
      (function() {
        // Safe default: same-origin for dev, api.atlasynq.com for production
        const CP_BASE = (location.hostname === 'www.atlasynq.com' || location.hostname === 'atlasynq.com') ? 'https://api.atlasynq.com' : (location.origin || location.protocol + '//' + location.host);
        /** App host is chat-only; marketing site hosts login. */
        function atlasynqMarketingLoginUrl() {
          var h = location.hostname;
          if (h === 'app.atlasynq.com') return 'https://www.atlasynq.com/login/';
          if (h === 'www.atlasynq.com' || h === 'atlasynq.com') return '/login/';
          return '/login.html';
        }
        const msgEl = document.getElementById('loginMsg');
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const loggedIn = document.getElementById('loggedIn');
        const userDisplay = document.getElementById('userDisplay');
        const btnGoogle = document.getElementById('btnGoogle');
        const btnMicrosoft = document.getElementById('btnMicrosoft');

        function setMsg(text, type) {
          if (!msgEl) return;
          msgEl.textContent = text || '';
          msgEl.className = type || '';
          msgEl.style.display = text ? 'block' : 'none';
        }

        function getDetail(data) {
          if (typeof data.detail === 'string') return data.detail;
          if (Array.isArray(data.detail) && data.detail[0] && data.detail[0].msg) return data.detail[0].msg;
          return 'Request failed';
        }

        function verifyPageUrl(email, nextPath) {
          var h = location.hostname;
          if (h === 'www.atlasynq.com' || h === 'atlasynq.com') {
            return '/verify/?email=' + encodeURIComponent(email) + '&next=' + encodeURIComponent(nextPath);
          }
          return '/verify.html?email=' + encodeURIComponent(email) + '&next=' + encodeURIComponent(nextPath);
        }

        function getCookie(name) {
          var m = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
          return m ? decodeURIComponent(m[1]) : null;
        }

        function traceMark(name, extra) {
          var now = Date.now();
          window.__ATLASYNQ_TIMINGS__ = window.__ATLASYNQ_TIMINGS__ || [];
          window.__ATLASYNQ_TIMINGS__.push({ name: name, t: now, extra: extra || null });
          try { console.info('[AtlaSynq/timing]', name, extra || ''); } catch (e) {}
        }

        /** LibreChat origin — tenant cookies must be set here, not on control-plane-web (different port = different origin). */
        function librechatOriginForBridge() {
          if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return 'http://localhost:3080';
          var h = location.hostname;
          if (h === 'www.atlasynq.com' || h === 'atlasynq.com') return 'https://app.atlasynq.com';
          return location.origin;
        }

        /** When redirected from PlugZap (no AtlaSynq cookies), sync from LibreChat session if user is already logged in. */
        async function trySyncFromLibreChatSession() {
          var next = new URLSearchParams(location.search).get('next');
          if (!next || !next.startsWith('/')) return false;
          if (getCookie('atlasynq_user_id') || getCookie('atlasynq_user_email')) {
            window.location.href = next;
            return true;
          }
          try {
            var headers = {};
            var lcToken = localStorage.getItem('token') || localStorage.getItem('librechat_token');
            if (lcToken) headers['Authorization'] = 'Bearer ' + lcToken;
            var r = await fetch('/api/user', { credentials: 'include', headers: headers });
            if (!r.ok) return false;
            var data = await r.json().catch(function() { return {}; });
            var user = data.user || data;
            var email = (user.email || user.username || '').trim();
            if (!email) return false;
            document.cookie = 'atlasynq_user_email=' + encodeURIComponent(email) + ';path=/;max-age=7200;samesite=lax';
            window.location.href = next;
            return true;
          } catch (e) {
            return false;
          }
        }

        async function redirectToLibreChat(token, fallbackUrl, showLoggedInOnFail) {
          try {
            const apiUrl = (CP_BASE || location.origin || '') + '/api/cp/sso/librechat';
            const r = await fetch(apiUrl, {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + token },
            });
            const data = await r.json().catch(function() { return {}; });
            if (r.ok && data.redirect_url) {
              var me = null;
              var wl0 = null;
              try {
                var mr = await fetch(CP_BASE + '/api/cp/me', { headers: { Authorization: 'Bearer ' + token } });
                if (mr.ok) me = await mr.json();
                var wr = await fetch(CP_BASE + '/api/cp/workspaces', { headers: { Authorization: 'Bearer ' + token } });
                if (wr.ok) { var wl = await wr.json(); wl0 = wl && wl[0]; }
              } catch (e) { console.warn('[login] me/workspaces for tenant bridge', e); }
              var lcBase = librechatOriginForBridge();
              var payload = {
                token: token,
                org_id: wl0 && wl0.org_id ? wl0.org_id : null,
                workspace_id: wl0 && wl0.id ? wl0.id : null,
                user_id: me && me.id ? me.id : null,
                email: me && me.email ? me.email : null,
                next: data.redirect_url
              };
              var bridgeUrl = lcBase + '/atlasynq-tenant-bridge.html#' + encodeURIComponent(JSON.stringify(payload));
              console.log('[login] tenant bridge (LibreChat origin) org_id=', payload.org_id, 'workspace_id=', payload.workspace_id, 'next=', payload.next);
              window.location.replace(bridgeUrl);
              setTimeout(function() {
                var ov = document.getElementById('_loginOverlay');
                if (ov && !document.hidden) {
                  var stage = document.getElementById('_loginStage');
                  if (stage) {
                    stage.innerHTML = 'Redirect blocked? <a href="' + bridgeUrl + '" style="color:#60a5fa;font-weight:600">Click here to continue</a>';
                  }
                }
              }, 2000);
              return;
            }
            if (r.status === 401) {
              localStorage.removeItem('cp_token');
              localStorage.removeItem('atlasynq_token');
              window.location.href = atlasynqMarketingLoginUrl();
              return;
            }
            var ovEl = document.getElementById('_loginOverlay');
            if (ovEl) ovEl.remove();
            var errText = (data.detail || data.message || 'Launch failed') + '. ';
            if (showLoggedInOnFail && form && loggedIn && userDisplay) {
              form.style.display = 'none';
              if (btnGoogle) btnGoogle.style.display = 'none';
              if (btnMicrosoft) btnMicrosoft.style.display = 'none';
              userDisplay.textContent = document.getElementById('email').value.trim() || 'User';
              loggedIn.classList.add('show');
              loggedIn.style.display = 'block';
            }
            setMsg(errText + 'Click Launch AtlaSynq to retry, or use the link below to open chat.', 'error');
          } catch (e) {
            var ovEl = document.getElementById('_loginOverlay');
            if (ovEl) ovEl.remove();
            var errText = 'Network error: ' + (e.message || 'Ensure services are running');
            if (showLoggedInOnFail && form && loggedIn && userDisplay) {
              form.style.display = 'none';
              if (btnGoogle) btnGoogle.style.display = 'none';
              if (btnMicrosoft) btnMicrosoft.style.display = 'none';
              userDisplay.textContent = document.getElementById('email').value.trim() || 'User';
              loggedIn.classList.add('show');
              loggedIn.style.display = 'block';
            }
            setMsg(errText + '. Click Launch AtlaSynq to retry.', 'error');
          }
        }

        function normalizeNextPath(raw) {
          if (!raw) return '/onboarding.html';
          var p = String(raw).trim();
          if (p.indexOf('//') !== -1) return '/onboarding.html';
          return p.startsWith('/') ? p : '/' + p;
        }

        function finishOAuthFromSignupPopup(dest) {
          try {
            if (!window.opener || window.opener.closed) return false;
            if (sessionStorage.getItem('atlasynq_oauth_from_popup') !== '1') return false;
            sessionStorage.removeItem('atlasynq_oauth_from_popup');
            window.opener.location.href = dest;
            try { window.opener.focus(); } catch (e) {}
            window.close();
            return true;
          } catch (e) {
            return false;
          }
        }

        async function handleExchangeCode(code) {
          try {
            const r = await fetch(CP_BASE + '/api/cp/oauth/exchange', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ exchange_code: code }),
            });
            const data = await r.json().catch(function() { return {}; });
            if (r.ok && data.access_token) {
              localStorage.setItem('cp_token', data.access_token);
              localStorage.setItem('atlasynq_token', data.access_token);
              try {
                var meRes = await fetch(CP_BASE + '/api/cp/me', { headers: { Authorization: 'Bearer ' + data.access_token } });
                if (meRes.ok) {
                  var me = await meRes.json();
                  if (me && me.id && me.id !== 'default_user') {
                    /* atlasynq_* cookies are set on LibreChat origin via redirectToLibreChat → /atlasynq-tenant-bridge.html */
                  }
                }
              } catch (e) {}
              var nextPathRaw = new URLSearchParams(location.search).get('next');
              var dest = normalizeNextPath(nextPathRaw);
              if (dest.indexOf('onboarding') >= 0) {
                if (finishOAuthFromSignupPopup(dest)) return true;
                window.location.href = dest;
                return true;
              }
              await redirectToLibreChat(data.access_token, '/onboarding.html');
              return true;
            }
            setMsg(getDetail(data), 'error');
          } catch (err) {
            setMsg('Network error. Please try again.', 'error');
          }
          return false;
        }

        async function showMeAndSuccess() {
          var token = localStorage.getItem('cp_token') || localStorage.getItem('atlasynq_token');
          if (!token || !form || !loggedIn) return;
          // Migrate: if we have atlasynq_token but no cp_token, copy (CP login sets both; legacy sessions may have only atlasynq_token)
          if (!localStorage.getItem('cp_token') && localStorage.getItem('atlasynq_token')) {
            try {
              var p = (localStorage.getItem('atlasynq_token') || '').split('.')[1];
              if (p) {
                var pl = JSON.parse(atob(p.replace(/-/g, '+').replace(/_/g, '/')));
                if (pl && pl.sub && pl.sub !== 'default_user') {
                  localStorage.setItem('cp_token', localStorage.getItem('atlasynq_token'));
                }
              }
            } catch (e) {}
          }
          token = localStorage.getItem('cp_token') || token;
          try {
            const r = await fetch(CP_BASE + '/api/cp/me', { headers: { Authorization: 'Bearer ' + token } });
            if (r.ok) {
              const user = await r.json();
              if (userDisplay) userDisplay.textContent = user.email || user.full_name || 'User';
              // Auto-launch: skip "Launch AtlaSynq" click — go straight to LibreChat
              var dest = new URLSearchParams(location.search).get('next');
              if (dest && dest.startsWith('/')) {
                redirectToLibreChat(token, dest);
              } else {
                redirectToLibreChat(token, '/c/new');
              }
              return;
            }
          } catch (e) {}
          // No valid session — show form (or logged-in UI as fallback if redirect fails)
          form.style.display = '';
          if (btnGoogle) btnGoogle.style.display = '';
          if (btnMicrosoft) btnMicrosoft.style.display = '';
          if (loggedIn) loggedIn.classList.remove('show');
        }

        var params = new URLSearchParams(location.search);
        var exchangeCode = params.get('exchange_code');
        var msgParam = params.get('msg');
        var nextParam = params.get('next');
        if (exchangeCode) {
          handleExchangeCode(exchangeCode);
        } else if (nextParam && nextParam.startsWith('/')) {
          // PlugZap redirected here (no AtlaSynq cookies) – try to sync from LibreChat session first
          trySyncFromLibreChatSession().then(function(synced) {
            if (!synced) {
              showMeAndSuccess().then(function() {
                if (msgParam === 'session_expired') {
                  setMsg('Your chat session expired. Sign in below, or click Launch AtlaSynq if you are already signed in.', 'info');
                }
              });
            }
          });
        } else {
          showMeAndSuccess().then(function() {
            if (msgParam === 'session_expired') {
              setMsg('Your chat session expired. Sign in below, or click Launch AtlaSynq if you are already signed in.', 'info');
            }
            // Auto-submit when credentials are pre-filled (browser autofill) — call doLogin directly
            // (never use form.requestSubmit() — it can trigger native GET submit and leak credentials to URL)
            function tryAutoSubmit() {
              if (!form || form.style.display === 'none' || document.getElementById('_loginOverlay')) return;
              var em = form ? form.querySelector('input[name="email"]') : null;
              var pw = form ? form.querySelector('input[name="password"]') : null;
              if (em && pw && (em.value || '').trim().length > 0 && (pw.value || '').length > 0 && typeof doLogin === 'function') {
                doLogin();
              }
            }
            setTimeout(tryAutoSubmit, 400);
            setTimeout(tryAutoSubmit, 1200);
          });
        }

        if (btnGoogle) {
          btnGoogle.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = CP_BASE + '/api/cp/oauth/google/public-start';
          });
        }
        if (btnMicrosoft) {
          btnMicrosoft.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = CP_BASE + '/api/cp/oauth/microsoft/start';
          });
        }
        var btnLaunch = document.getElementById('btnLaunch');
        if (btnLaunch) {
          btnLaunch.addEventListener('click', function() {
            var token = localStorage.getItem('cp_token') || localStorage.getItem('atlasynq_token');
            if (token) redirectToLibreChat(token, '/onboarding.html');
          });
        }
        var btnSignOut = document.getElementById('btnSignOut');
        if (btnSignOut) {
          btnSignOut.addEventListener('click', function() {
            localStorage.removeItem('cp_token');
            localStorage.removeItem('atlasynq_token');
            location.reload();
          });
        }

        var _loginSubmitting = false;
        async function doLogin() {
          if (_loginSubmitting) return;
          var emailEl = form ? form.querySelector('input[name="email"]') : null;
          var passwordEl = form ? form.querySelector('input[name="password"]') : null;
          if (!form || !submitBtn || !emailEl || !passwordEl) {
            setMsg('Form fields not found. Please refresh the page.', 'error');
            return;
          }
          const email = (emailEl.value || '').trim();
          const password = passwordEl.value || '';
          if (!email || !password) {
            setMsg('Please enter email and password.', 'error');
            return;
          }
          _loginSubmitting = true;
          traceMark('auth_submit_start');
          setMsg('');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Signing in…';

          // Show branded loading overlay immediately
            var _ov = document.createElement('div');
            _ov.id = '_loginOverlay';
            _ov.style.cssText = 'position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:Inter,system-ui,sans-serif';
            _ov.innerHTML = '<img src="/assets/images/atlasynq-logo.png" style="width:56px;height:56px;border-radius:12px;animation:_lp 2s ease-in-out infinite" onerror="this.style.display=\'none\'"><style>@keyframes _lp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:0.8}}</style><h2 style="margin-top:1rem;font-size:1.3rem;font-weight:700">Signing you in...</h2><p style="color:#94a3b8;font-size:0.88rem;margin-top:0.4rem" id="_loginStage">Connecting to AtlaSynq</p>';
            document.body.appendChild(_ov);
            function _loginStage(t) { var el = document.getElementById('_loginStage'); if (el) el.textContent = t; }
            function _removeLoginOv() { var el = document.getElementById('_loginOverlay'); if (el) el.remove(); }

            try {
              _loginStage('Authenticating...');
              traceMark('librechat_login_request_start');
              var _hostLogin = location.hostname || '';
              var _marketingSite = _hostLogin === 'www.atlasynq.com' || _hostLogin === 'atlasynq.com';
              // GitHub Pages has no /api/auth/* — use control-plane API only, then bridge to app.atlasynq.com
              if (_marketingSite) {
                traceMark('marketing_static_cp_login');
                _loginStage('Signing in...');
                const rCpM = await fetch(CP_BASE + '/api/cp/login', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ email, password }),
                });
                const dataCpM = await rCpM.json().catch(function() { return {}; });
                traceMark('cp_login_marketing', { ok: !!rCpM.ok, status: rCpM.status });
                if (rCpM.ok && dataCpM.access_token) {
                  localStorage.setItem('cp_token', dataCpM.access_token);
                  localStorage.setItem('atlasynq_token', dataCpM.access_token);
                  try {
                    var meRm = await fetch(CP_BASE + '/api/cp/me', { headers: { Authorization: 'Bearer ' + dataCpM.access_token } });
                    if (meRm.ok) { await meRm.json(); }
                  } catch (eM) {}
                  var nextM = new URLSearchParams(location.search).get('next');
                  if (nextM && nextM.startsWith('/') && nextM.indexOf('onboarding') >= 0) {
                    window.location.href = nextM;
                    return;
                  }
                  _loginStage('Launching AtlaSynq...');
                  await redirectToLibreChat(dataCpM.access_token, '/onboarding.html', true);
                  return;
                }
                if (rCpM.ok && dataCpM.status === 'verification_required') {
                  var nextV = new URLSearchParams(location.search).get('next') || '/';
                  window.location.href = verifyPageUrl(email, nextV);
                  return;
                }
                _removeLoginOv();
                traceMark('auth_submit_error');
                setMsg(getDetail(dataCpM) || 'Incorrect email or password.', 'error');
                return;
              }
              // Direct LibreChat login — fast, no SSO round-trip, preserves chat history (nginx / same origin as app)
              const r = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email, password }),
              });
              const data = await r.json().catch(function() { return {}; });
              traceMark('librechat_login_response', { ok: !!r.ok, status: r.status });
              // LibreChat may return token in body OR set session via cookies only — treat 200 as success
              if (r.ok) {
                traceMark('librechat_login_success');
                _loginStage('Launching AtlaSynq...');
                var next = new URLSearchParams(location.search).get('next');
                var dest = (next && next.startsWith('/')) ? next : '/c/new';
                var needsCpBootstrap = dest.indexOf('/onboarding') === 0 || dest.indexOf('/integrations') === 0;
                var domain = location.hostname === 'localhost' ? 'localhost' : '';
                var syncCpIdentity = async function() {
                  try {
                    _loginStage('Syncing AtlaSynq account...');
                    traceMark('cp_bootstrap_start', { dest: dest });
                    var r2Lc = await fetch(CP_BASE + '/api/cp/login', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ email, password }),
                    });
                    var data2Lc = await r2Lc.json().catch(function() { return {}; });
                    if (r2Lc.ok && data2Lc.access_token) {
                      localStorage.setItem('cp_token', data2Lc.access_token);
                      localStorage.setItem('atlasynq_token', data2Lc.access_token);
                      try {
                        await fetch(CP_BASE + '/api/cp/sso/store-librechat-secret-from-login', {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + data2Lc.access_token },
                          body: JSON.stringify({ password: password }),
                        });
                      } catch (e2) {}
                    }
                  } catch (e) {
                    console.warn('[login] cp bootstrap non-blocking failure', e);
                  } finally {
                    if (!getCookie('atlasynq_user_id') && !getCookie('atlasynq_user_email')) {
                      document.cookie = 'atlasynq_user_email=' + encodeURIComponent(email) + ';path=/;max-age=7200;samesite=lax' + (domain ? ';domain=' + domain : '');
                    }
                    traceMark('cp_bootstrap_end');
                  }
                };
                if (!needsCpBootstrap) {
                  // Critical UX fix: do not block chat redirect on control-plane bootstrap.
                  // Bootstrap runs in the background and should never delay first chat render.
                  syncCpIdentity();
                  traceMark('redirect_to_chat', { dest: dest });
                  window.location.replace(dest);
                  return;
                }
                await Promise.race([
                  syncCpIdentity(),
                  new Promise(function(resolve) { setTimeout(resolve, 1200); }),
                ]);
                traceMark('redirect_with_cp_bootstrap', { dest: dest });
                window.location.replace(dest);
                return;
              }
              // Fallback: try control-plane SSO for users who don't have a LibreChat password
              _loginStage('Setting up your session...');
              traceMark('cp_login_fallback_start');
              const r2Cp = await fetch(CP_BASE + '/api/cp/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
              });
              const data2Cp = await r2Cp.json().catch(function() { return {}; });
              traceMark('cp_login_fallback_response', { ok: !!r2Cp.ok, status: r2Cp.status });
              if (r2Cp.ok && data2Cp.access_token) {
                localStorage.setItem('cp_token', data2Cp.access_token);
                localStorage.setItem('atlasynq_token', data2Cp.access_token);
                try {
                  var meRes = await fetch(CP_BASE + '/api/cp/me', { headers: { Authorization: 'Bearer ' + data2Cp.access_token } });
                  if (meRes.ok) {
                    var me = await meRes.json();
                    if (me && me.id && me.id !== 'default_user') {
                      /* tenant cookies: redirectToLibreChat uses /atlasynq-tenant-bridge.html on :3080 */
                    }
                  }
                } catch (e) {}
                var next = new URLSearchParams(location.search).get('next');
                if (next && next.startsWith('/') && next.indexOf('onboarding') >= 0) {
                  window.location.href = next;
                  return;
                }
                _loginStage('Launching AtlaSynq...');
                await redirectToLibreChat(data2Cp.access_token, '/onboarding.html', true);
                return;
              }
              if (r2Cp.ok && data2Cp.status === 'verification_required') {
                const next = new URLSearchParams(location.search).get('next') || '/';
                window.location.href = verifyPageUrl(email, next);
                return;
              }
              // Show the most specific error
              const errMsg = (data.message && !data.message.includes('Internal')) ? data.message
                           : getDetail(data2Cp) || 'Incorrect email or password.';
              _removeLoginOv();
              traceMark('auth_submit_error');
              setMsg(errMsg, 'error');
            } catch (err) {
              _removeLoginOv();
              traceMark('auth_submit_network_error');
              setMsg('Network error. Please try again.', 'error');
            } finally {
              _loginSubmitting = false;
              submitBtn.disabled = false;
              submitBtn.textContent = 'Sign in';
            }
        }

        if (form && submitBtn) {
          form.addEventListener('submit', async function(e) {
            e.preventDefault();
            e.stopPropagation();
            await doLogin();
          });
          form.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              e.stopPropagation();
              doLogin();
            }
          });
          submitBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            await doLogin();
          });
        }
      })();
    </script>
  </body>
</html>
